<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osteria da Nona</title>
</head>
<body>
    <!-- O header representa o cabeçalho da página. Utilizado aqui para Inserir o titulo e o menu de navegação no topo do site. -->
    <header>
        <!-- H1 é o titulo principal e único do site-->
        <h1>Osteria da Nona</h1>

        <!--Nav representa um bloco de links de navegação. identifica os caminhos do site e leitores pode clicar e serem direcionados para outras páginas. Atributo ARIA-LABEL adicionado para maior acessibilidade.-->
        <nav aria-label="Navegação Principal">
            <ul>
                <li><a href="#inicio">Início</a></li>
                <li><a href="#nossa-historia">Nossa História</a></li>
                <li><a href="#onde-estamos"></a>Onde Estamos</li>
                <li><a href="#reservas"></a>Reservas</li>
                <li><a href="#contato"></a>Contato</li>

            </ul>
        </nav>
    </header>

    <!--O main indica o conteúdo principal de uma página. Só pode existir um por página-->
    <main>

        <!--A section separa blocos em uma página. É usado para agrupar conteúdos relacionados ajudando na organização. Aqui foi utilizada para uma sessão de boas-vindas-->
        <section id="bem-vindo">
            <h2>Benvenuto a Nostra Cucina!</h2>
            
        </section>

    </main>

</body>
</html>
